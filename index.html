    <style>
        @keyframes rippleEffect { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; } }
        @keyframes autoZoomSlow { 0%, 100% { transform: scale(1.1); } 50% { transform: scale(1.2); } }
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.15); } 28% { transform: scale(1); } 42% { transform: scale(1.15); } }
        @keyframes heartCascade { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 0.3; } 
            90% { opacity: 0.3; } 
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
        }
        @keyframes breathingZoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .ripple-ring { animation: rippleEffect 0.6s ease-out forwards; position: fixed; pointer-events: none; border: 2px solid #FF89A2; border-radius: 50%; width: 24px; height: 24px; z-index: 9999; }
        .animate-auto-zoom { animation: autoZoomSlow 15s ease-in-out infinite; }
        .animate-spin-slow { animation: spinSlow 20s linear infinite; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .animate-heartbeat { animation: heartBeat 1.2s infinite; }
        .animate-heart-cascade { animation: heartCascade linear infinite; position: absolute; top: -50px; }
        .animate-breathing { animation: breathingZoom 3s ease-in-out infinite; display: inline-block; }

        .font-amore { font-family: 'Pinyon Script', 'Mrs Saint Delafield', cursive; }
        .font-msg { font-family: 'Quicksand', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff89a2; border-radius: 10px; }
        
        body { 
            background-color: #050505; 
            color: white; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh; 
            width: 100vw; 
            font-family: sans-serif;
            display: flex;
            align-items: center; 
            justify-content: center;
        }
        
        #main-image-container img { transition: transform 0.4s ease-out; }
        audio { display: none; }
        
        #wallpaper {
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: opacity 0.5s ease-in-out, background-image 0.8s ease-in-out;
        }

        .opacity-dot {
            width: 6px;
            height: 4px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .opacity-dot.active {
            background: #ff89a2;
            box-shadow: 0 0 5px #ff89a2;
        }

        #heart-cascade-container {
            transition: opacity 2s ease-in-out;
        }
    </style>
</head>

                labelDedicationFooter: "iiCarvaozim ♡", btnWallpapers: "Wallpapers", btnMode: "Mode: ", pc: "PC", mobile: "Mobile",
                days: "DAYS", loading: "Loading...", today: "Today is the 3rd!", left: "Left: ",
                months: ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'],
                dedication: `Hello my love, honestly I was dying to let you know once again how important you are to me...`
            }
        };

        let lang = 'ES';
        let isFirebaseActive = false;
        let firebaseConfig = {
            apiKey: "AIzaSyBIf4-Sls4zIk2aj6GOI_Ol9HtKGKlI_Ag",
            authDomain: "perfilanime-8809f.firebaseapp.com",
            projectId: "perfilanime-8809f",
            storageBucket: "perfilanime-8809f.firebasestorage.app",
            messagingSenderId: "162868028576",
            appId: "1:162868028576:web:88f6276ab5c779bb6fd5c5"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let app, auth, db, currentUser = null;
        let activeTab = 'INICIO';
        let viewMode = 'DESKTOP';
        let isPlaying = false;
        let showHeartsOverlay = false;

        window.onload = async () => {
            setLang('ES');
            renderGrids();
            renderHeartRings();
            updateOpacityUI();
            lucide.createIcons();

            window.addEventListener('mousedown', startMusic);
            window.addEventListener('touchstart', startMusic);
            window.addEventListener('mousedown', createRipple);
            window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'p') togglePlay(e); });

            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseActive = true;
                await signInAnonymously(auth);
                onAuthStateChanged(auth, u => { currentUser = u; if(u) initFirestore(); });

            setupDrag();
        };

        window.cycleWallpapers = (e) => {
            if(e) e.stopPropagation();
            currentWpIndex = (currentWpIndex + 1) % wallpapersList.length;
            const wpUrl = wallpapersList[currentWpIndex];
            document.getElementById('wallpaper').style.backgroundImage = `url('${wpUrl}')`;

        function updateWallpaperLabel() {
            const t = translations[lang];
            const label = document.getElementById('btn-wallpapers-label');
            label.innerText = `${t.btnWallpapers} ${currentWpIndex + 1}`;
        }

        window.adjustOpacity = () => {
            currentWallpaperOpacity += 10;
            if(currentWallpaperOpacity > 100) currentWallpaperOpacity = 0;
            document.getElementById('wallpaper').style.opacity = currentWallpaperOpacity / 100;
            updateOpacityUI();
        };

        function updateOpacityUI() {
            const bar = document.getElementById('opacity-bar');
            let html = '';
            for(let i=1; i<=10; i++) {
                const isActive = (i * 10) <= currentWallpaperOpacity;
                html += `<div class="opacity-dot ${isActive ? 'active' : ''}"></div>`;
            }
            bar.innerHTML = html;
        }

        window.setLang = (l) => {
            lang = l; const t = translations[l];
            document.getElementById('tab-INICIO').innerText = t.tabInicio;
            document.getElementById('tab-ALBUM').innerText = t.tabALBUM;
            document.getElementById('tab-RECUERDOS').innerText = t.tabRecuerdos;
            document.getElementById('label-married').innerText = t.labelMarried;
            document.getElementById('label-gallery').innerText = t.labelGallery;
            document.getElementById('label-dedication').innerText = t.labelDedication;
            document.getElementById('dedication-text').innerText = t.dedication;
            document.getElementById('dedication-footer').innerText = t.labelDedicationFooter;
            updateWallpaperLabel();
            const textEl = document.getElementById('view-mode-text');
            textEl.innerText = t.btnMode + (viewMode === 'DESKTOP' ? t.pc : t.mobile);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('text-[#ff89a2]'));
            document.getElementById('btn-'+l.toLowerCase()).classList.add('text-[#ff89a2]');
            initDate();
        };

        window.openStats = (e) => {
            if (e) e.stopPropagation();
            const list = document.getElementById('stats-list');
            let html = '';
            const sortedCountries = Object.keys(currentStats).filter(k => k !== 'total' && k !== 'UNKNOWN').sort((a, b) => currentStats[b] - currentStats[a]);
            sortedCountries.forEach(code => {
                const count = currentStats[code];
                const flagUrl = `https://flagcdn.com/w80/${code.toLowerCase()}.png`;
                html += `
                    <div class="flex flex-col items-center justify-center bg-white/5 p-2 rounded-xl border border-white/5 hover:bg-white/10 transition-all">
                        <img src="${flagUrl}" class="w-8 h-auto rounded-[2px] shadow-sm mb-1" alt="${code}">
                        <span class="text-[10px] font-black text-[#ff89a2]">${count}</span>
                    </div>`;
            });
            list.innerHTML = html || '<p class="text-center text-xs text-gray-500 py-4 col-span-full">Sin datos.</p>';
            document.getElementById('modal-stats').classList.remove('hidden');
        };
        window.closeStats = () => document.getElementById('modal-stats').classList.add('hidden');

        window.togglePlay = (e) => { if (e) e.stopPropagation(); const a = document.getElementById('bg-audio'); if(a.paused) a.play(); else a.pause(); isPlaying = !a.paused; updateMusicUI(); };
        function updateMusicUI() { const b = document.getElementById('play-btn'); b.innerHTML = isPlaying ? '<i data-lucide="pause" class="w-3.5 h-3.5 text-[#ff89a2] fill-[#ff89a2]"></i>' : '<i data-lucide="play" class="w-3.5 h-3.5 text-[#ff89a2] fill-[#ff89a2]"></i>'; lucide.createIcons(); }
        
        window.toggleCascade = () => {
            showHeartsOverlay = !showHeartsOverlay;
            const container = document.getElementById('heart-cascade-container');
            const icon = document.getElementById('cascade-icon');
            if(showHeartsOverlay) {
                container.classList.remove('hidden');
                container.innerHTML = '';
                container.style.opacity = '1';
                for(let i=0; i<35; i++) {
                    const h = document.createElement('div');
                    h.className = 'absolute animate-heart-cascade';
                    h.style.left = Math.random() * 100 + '%';
                    h.style.animationDelay = Math.random() * 5 + 's';
                    h.style.animationDuration = (3 + Math.random() * 4) + 's';
                    const color = Math.random() > 0.5 ? '#ff89a2' : '#ffffff';
                    h.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${color}" stroke="${color}"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.505 4.044 3 5.5L12 21l7-7Z"/></svg>`;
                    container.appendChild(h);
                }
                icon.setAttribute('data-lucide', 'arrow-down');
            } else {
                container.style.opacity = '0';
                icon.setAttribute('data-lucide', 'arrow-up');
                setTimeout(() => { if(!showHeartsOverlay) container.classList.add('hidden'); }, 2000);
            }
            lucide.createIcons();
        };

        window.toggleViewMode = (e) => {
            if (e) e.stopPropagation(); viewMode = viewMode === 'DESKTOP' ? 'MOBILE' : 'DESKTOP'; const w = document.getElementById('desktop-widgets'); const icon = document.getElementById('view-mode-icon');
            if(viewMode === 'MOBILE') { w.classList.add('hidden'); icon.innerHTML = '<i data-lucide="smartphone" class="w-4 h-4"></i>'; }
            else { w.classList.remove('hidden'); icon.innerHTML = '<i data-lucide="monitor" class="w-4 h-4"></i>'; }
            const t = translations[lang]; document.getElementById('view-mode-text').innerText = t.btnMode + (viewMode === 'DESKTOP' ? t.pc : t.mobile); lucide.createIcons();
        };

        window.setTab = (tab) => {
            activeTab = tab; document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-[#ff89a2]/70', 'text-white'); b.classList.add('text-gray-400'); });
            document.getElementById('tab-'+tab).classList.remove('text-gray-400'); document.getElementById('tab-'+tab).classList.add('bg-[#ff89a2]/70', 'text-white');
            document.getElementById('view-INICIO').classList.add('hidden'); document.getElementById('view-ALBUM').classList.add('hidden'); document.getElementById('view-RECUERDOS').classList.add('hidden'); document.getElementById('view-'+tab).classList.remove('hidden');
        };

        window.openLightbox = (img) => { document.getElementById('lightbox-img').src = img; document.getElementById('lightbox').classList.remove('hidden'); };
        window.closeLightbox = () => document.getElementById('lightbox').classList.add('hidden');

        function initDate() {
            const t = translations[lang]; const now = new Date(); document.getElementById('cal-day').innerText = now.getDate(); document.getElementById('cal-month').innerText = t.months[now.getMonth()];
            const start = new Date('2023-03-03'); document.getElementById('days-passed').innerText = `${Math.floor((now - start) / (1000 * 60 * 60 * 24))} ${t.days}`;
            const d = now.getDate(); let nt = d < 3 ? new Date(now.getFullYear(), now.getMonth(), 3) : new Date(now.getFullYear(), now.getMonth()+1, 3);
            let lt = d < 3 ? new Date(now.getFullYear(), now.getMonth()-1, 3) : new Date(now.getFullYear(), now.getMonth(), 3);
            document.getElementById('fill-percent').innerText = Math.round(Math.max(0, Math.min(100, ((now - lt) / (nt - lt)) * 100))) + '%';
            const left = Math.ceil((nt - now) / (1000 * 60 * 60 * 24)); document.getElementById('days-left-msg').innerText = left === 0 ? t.today : `${t.left}${left} d`;
        }

        function renderHeartRings() {
            let h1 = '', h2 = '', h3 = '';
            for(let i=0; i<8; i++){ 
                h1 += `<div class="absolute" style="transform: rotate(${i*45}deg) translateY(-38px)"><i data-lucide="heart" class="w-2 h-2 text-[#ff89a2] fill-[#ff89a2]"></i></div>`; 
                h2 += `<div class="absolute" style="transform: rotate(${i*45}deg) translateY(-38px)"><i data-lucide="heart" class="w-2 h-2 text-white fill-white opacity-80"></i></div>`; 
                // Anillo con nuevo COLOR #a2ffe8
                h3 += `<div class="absolute" style="transform: rotate(${i*45}deg) translateY(-34px)"><i data-lucide="heart" class="w-2 h-2 text-[#a2ffe8] fill-[#a2ffe8]"></i></div>`;
            }
            document.getElementById('heart-ring-1').innerHTML = h1; 
            document.getElementById('heart-ring-2').innerHTML = h2;
            document.getElementById('heart-ring-wallpapers').innerHTML = h3;
            lucide.createIcons();
        }

        function startMusic() { const a = document.getElementById('bg-audio'); if(!isPlaying) { a.play().catch(()=>{}); isPlaying = true; updateMusicUI(); } window.removeEventListener('mousedown', startMusic); window.removeEventListener('touchstart', startMusic); }
        function setupDrag() { const dragImg = document.getElementById('draggable-img'); let isDragging = false, startX, startY, curX = 0, curY = 0; dragImg.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - curX; startY = e.clientY - curY; dragImg.style.cursor = 'grabbing'; }); window.addEventListener('mousemove', e => { if(!isDragging) return; curX = e.clientX - startX; curY = e.clientY - startY; dragImg.style.transform = `scale(1.2) translate(${curX/10}px, ${curY/10}px)`; }); window.addEventListener('mouseup', () => { isDragging = false; dragImg.style.cursor = 'grab'; }); }

        async function initFirestore() {
            if (!isFirebaseActive || !currentUser) return;
            const country = await (async () => { try { const res = await fetch('https://get.geojs.io/v1/ip/country.json'); const data = await res.json(); return data.country || 'UNKNOWN'; } catch(e) { return 'UNKNOWN'; } })();
            const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'visits_countries');
            if (!sessionStorage.getItem('visited')) { await setDoc(vRef, { total: increment(1), [country]: increment(1) }, { merge: true }); sessionStorage.setItem('visited', 'true'); }
            onSnapshot(vRef, (d) => { if(d.exists()) { currentStats = d.data(); document.getElementById('visits-count').innerText = currentStats.total || 0; } });
        }

        function renderGrids() {
            document.getElementById('ALBUM-grid').innerHTML = galleryImages.map((img, i) => `<div class="rounded-3xl overflow-hidden cursor-pointer border border-white/5 group" onclick="openLightbox('${img}')"><img src="${img}" class="w-full h-auto transition-transform duration-1000 group-hover:scale-110"></div>`).join('');
            document.getElementById('recuerdos-grid').innerHTML = recuerdosImages.map((img, i) => `<div class="flex flex-col items-center"><div class="rounded-3xl overflow-hidden border border-[#ff89a2]/30 cursor-pointer group" onclick="openLightbox('${img}')"><img src="${img}" class="w-full h-auto transition-transform duration-1000 group-hover:scale-105"></div></div>`).join('');
        }
        function createRipple(e) { const r = document.createElement('div'); r.className = 'ripple-ring'; r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px'; document.body.appendChild(r); setTimeout(() => r.remove(), 600); }
    </script>
</body>
</html>
